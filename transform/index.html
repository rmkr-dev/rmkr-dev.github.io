<!DOCTYPE html>
<html lang="en">
<head>
    <script>fetch('https://api.countapi.xyz/hit/rmkr-dev.github.io/transform');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payload Knife | RMKR Dev</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    
    <style>
        :root {
            --color-bg: #0C1524; --color-card: #18233C; 
            --color-accent: #FFC300; --color-text: #F0F4F8; 
            --color-muted: #A0AEC0; --color-line: #2D3748;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--color-bg); color: var(--color-text); }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        textarea {
            font-family: 'Fira Code', monospace;
            background: #080E1A !important;
            color: #4ade80 !important;
            border: 1px solid var(--color-line);
            resize: none; outline: none;
        }

        .action-btn {
            background: var(--color-card);
            border: 1px solid var(--color-line);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--color-muted);
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .action-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
        .action-btn.active { background: var(--color-accent); color: var(--color-bg); border-color: var(--color-accent); }
    </style>
</head>
<body>

<div class="wrap">
    <header class="flex justify-between items-center mb-8 border-b border-[--color-line] pb-4">
        <div>
            <h1 class="text-2xl font-bold italic tracking-tighter">PAYLOAD<span class="text-[--color-accent] not-italic">KNIFE</span></h1>
            <p class="text-xs text-[--color-muted] font-bold uppercase tracking-widest mt-1">Data Transformation Suite</p>
        </div>
        <a href="../" class="bg-[--color-card] p-3 rounded-xl border border-[--color-line] hover:border-[--color-accent] transition">
            <i class="fa-solid fa-house-user"></i>
        </a>
    </header>

    <div class="flex flex-wrap gap-2 mb-6 bg-[--color-card] p-3 rounded-xl border border-[--color-line]">
        <button onclick="transform('prettify')" class="action-btn">Prettify JSON</button>
        <button onclick="transform('minify')" class="action-btn">Minify JSON</button>
        <button onclick="transform('csv')" class="action-btn">JSON to CSV</button>
        <button onclick="transform('curl')" class="action-btn">CURL to Fetch</button>
        <div class="ml-auto flex gap-2">
            <button onclick="copyOutput()" class="text-[--color-accent] text-xs font-bold uppercase px-3">Copy Result</button>
            <button onclick="clearAll()" class="text-red-400 text-xs font-bold uppercase px-3">Clear</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 h-[60vh]">
        <div class="flex flex-col">
            <label class="text-[10px] font-black text-[--color-muted] uppercase mb-2 ml-1">Input Raw Data</label>
            <textarea id="input" class="w-full h-full p-4 rounded-xl text-xs leading-relaxed" placeholder='Paste JSON, CURL, or CSV here...'></textarea>
        </div>
        <div class="flex flex-col">
            <label class="text-[10px] font-black text-[--color-muted] uppercase mb-2 ml-1">Processed Output</label>
            <textarea id="output" class="w-full h-full p-4 rounded-xl text-xs leading-relaxed" readonly placeholder="Result will appear here..."></textarea>
        </div>
    </div>
</div>

<script>
    const inputArea = document.getElementById('input');
    const outputArea = document.getElementById('output');

    function transform(type) {
        const val = inputArea.value.trim();
        if (!val) return;

        try {
            if (type === 'prettify') {
                outputArea.value = JSON.stringify(JSON.parse(val), null, 4);
            } 
            else if (type === 'minify') {
                outputArea.value = JSON.stringify(JSON.parse(val));
            } 
            else if (type === 'csv') {
                const arr = JSON.parse(val);
                const items = Array.isArray(arr) ? arr : [arr];
                const replacer = (key, value) => value === null ? '' : value;
                const header = Object.keys(items[0]);
                const csv = [
                    header.join(','),
                    ...items.map(row => header.map(fieldName => JSON.stringify(row[fieldName], replacer)).join(','))
                ].join('\r\n');
                outputArea.value = csv;
            } 
            else if (type === 'curl') {
                outputArea.value = curlToFetch(val);
            }
        } catch (e) {
            outputArea.value = "ERROR: " + e.message;
        }
    }

    function curlToFetch(curl) {
        const urlMatch = curl.match(/curl\s+'?([^'\s]+)'?/);
        if (!urlMatch) return "Invalid CURL command";
        
        let url = urlMatch[1];
        let headers = {};
        let method = 'GET';
        let body = null;

        if (curl.includes('-X POST')) method = 'POST';
        if (curl.includes('-X PUT')) method = 'PUT';
        
        const headerMatches = curl.matchAll(/-H\s+'([^']+)'/g);
        for (const match of headerMatches) {
            const [key, value] = match[1].split(': ');
            headers[key] = value;
        }

        const dataMatch = curl.match(/--data(-raw)?\s+'([^']+)'/);
        if (dataMatch) body = dataMatch[2];

        return `fetch("${url}", {
    method: "${method}",
    headers: ${JSON.stringify(headers, null, 8)},
    ${body ? `body: JSON.stringify(${body})` : ''}
})
.then(res => res.json())
.then(console.log);`;
    }

    function copyOutput() {
        outputArea.select();
        document.execCommand('copy');
    }

    function clearAll() {
        inputArea.value = '';
        outputArea.value = '';
    }
</script>
</body>
</html>
