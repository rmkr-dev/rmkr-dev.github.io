<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Time Sync | RMKR Dev</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    
    <style>
        :root {
            --color-bg: #0C1524; --color-card: #18233C; 
            --color-accent: #FFC300; --color-text: #F0F4F8; 
            --color-muted: #A0AEC0; --color-line: #2D3748;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--color-bg); color: var(--color-text); }
        .wrap { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        .timeline-row {
            background: var(--color-card); border: 1px solid var(--color-line);
            border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 0.5rem;
            display: flex; align-items: center; gap: 20px;
        }

        .tz-info { width: 220px; flex-shrink: 0; border-right: 1px solid var(--color-line); }
        .grid-viewport { flex-grow: 1; overflow-x: auto; scrollbar-width: none; }
        .hour-grid { display: grid; grid-template-columns: repeat(24, 42px); gap: 4px; }

        .hour-cell {
            height: 48px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 0.7rem; cursor: pointer; transition: all 0.2s;
        }

        .hour-cell.active { background: var(--color-accent) !important; color: var(--color-bg) !important; font-weight: 800; transform: scale(1.05); z-index: 10; }
        .hour-cell.work { border-bottom: 3px solid #4ade80; } 
        .hour-cell.night { opacity: 0.3; background: rgba(0,0,0,0.3); }

        .quick-tag {
            background: var(--color-line); color: var(--color-text);
            padding: 4px 10px; border-radius: 6px; font-size: 0.65rem;
            font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .quick-tag:hover { background: var(--color-accent); color: var(--color-bg); }
    </style>
</head>
<body>

<div class="wrap">
    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-black text-white italic tracking-tighter">TIME<span class="text-[--color-accent] not-italic">SYNC</span></h1>
            <p class="text-[9px] text-[--color-muted] font-bold tracking-[0.2em] uppercase mt-1">Global Shift Alignment</p>
        </div>
        <a href="../" class="bg-[--color-card] w-10 h-10 flex items-center justify-center rounded-xl border border-[--color-line] hover:border-[--color-accent] transition">
            <i class="fa-solid fa-house-user"></i>
        </a>
    </header>

    <div class="bg-[--color-card] p-6 rounded-2xl mb-8 border border-[--color-line]">
        <div class="flex flex-wrap items-center gap-6">
            <div class="flex-grow">
                <span class="text-[10px] font-black text-[--color-muted] uppercase tracking-widest mb-3 block">Quick Add Standards</span>
                      <div class="flex flex-wrap gap-2">
                        <button onclick="addByCode('PST', 'America/Los_Angeles')" class="quick-tag">PST / PDT</button>
                        <button onclick="addByCode('MST', 'America/Denver')" class="quick-tag">MST / MDT</button>
                        <button onclick="addByCode('CST', 'America/Chicago')" class="quick-tag">CST / CDT</button>
                        <button onclick="addByCode('EST', 'America/New_York')" class="quick-tag">EST / EDT</button>
                        
                        <button onclick="addByCode('BRT', 'America/Sao_Paulo')" class="quick-tag">BRT (Brazil)</button>
                    
                        <button onclick="addByCode('UTC', 'UTC')" class="quick-tag">UTC / GMT</button>
                        <button onclick="addByCode('BST', 'Europe/London')" class="quick-tag">London</button>
                        <button onclick="addByCode('CET', 'Europe/Paris')" class="quick-tag">CET (Europe)</button>
                        <button onclick="addByCode('EET', 'Europe/Istanbul')" class="quick-tag">EET (EE/Turkey)</button>
                    
                        <button onclick="addByCode('IST', 'Asia/Kolkata')" class="quick-tag">IST (India)</button>
                        <button onclick="addByCode('SGT', 'Asia/Singapore')" class="quick-tag">SGT / HKG</button>
                        <button onclick="addByCode('JST', 'Asia/Tokyo')" class="quick-tag">JST (Japan)</button>
                        <button onclick="addByCode('AEST', 'Australia/Sydney')" class="quick-tag">AEST (Sydney)</button>
                    </div>
            </div>
            
            <div class="flex items-center gap-6 border-l border-[--color-line] pl-6">
                <div class="text-right">
                    <p class="text-[9px] uppercase text-[--color-muted] font-bold">Ref Time</p>
                    <p id="utc-clock" class="font-mono text-xl text-white font-black">00:00 <span class="text-[--color-accent] text-xs">UTC</span></p>
                </div>
                <button onclick="resetToNow()" class="text-[10px] font-black text-[--color-accent] border-2 border-[--color-accent] px-4 py-2 rounded-lg hover:bg-[--color-accent] hover:text-[--color-bg] transition-all">NOW</button>
            </div>
        </div>
    </div>

    <div id="timeline-container" class="space-y-3"></div>
</div>

<script>
    let activeUtcIndex = new Date().getUTCHours();
    // Default: Local + UTC
    const localTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
    let selectedZones = [
        { label: 'LOCAL', zone: localTZ },
        { label: 'UTC', zone: 'UTC' }
    ];

    function addByCode(label, zone) {
        if (!selectedZones.find(z => z.label === label)) {
            selectedZones.push({ label, zone });
            render();
        }
    }

    function removeZone(index) {
        if (selectedZones.length > 1) { selectedZones.splice(index, 1); render(); }
    }

    function resetToNow() { activeUtcIndex = new Date().getUTCHours(); render(); }

    function updateUTC() {
        const now = new Date();
        document.getElementById('utc-clock').innerHTML = `${now.getUTCHours().toString().padStart(2,'0')}:${now.getUTCMinutes().toString().padStart(2,'0')} <span class="text-[--color-accent] text-xs">UTC</span>`;
    }

    function render() {
        const container = document.getElementById('timeline-container');
        container.innerHTML = '';

        selectedZones.forEach((obj, idx) => {
            const row = document.createElement('div');
            row.className = 'timeline-row';
            const now = new Date();
            const timeInZone = now.toLocaleTimeString('en-US', { timeZone: obj.zone, hour: '2-digit', minute: '2-digit', hour12: true });

            row.innerHTML = `
                <div class="tz-info">
                    <div class="flex justify-between items-center mb-1 pr-4">
                        <span class="font-black text-white text-sm tracking-tight">${obj.label}</span>
                        <span class="text-[11px] font-mono text-[--color-accent] font-bold">${timeInZone}</span>
                    </div>
                    <div class="flex justify-between items-center pr-4">
                        <span class="text-[8px] text-[--color-muted] font-bold uppercase truncate max-w-[120px]">${obj.zone}</span>
                        ${idx > 1 ? `<button onclick="removeZone(${idx})" class="text-[9px] font-black text-red-400/50 hover:text-red-400 uppercase">Del</button>` : `<span class="text-[8px] text-blue-400/40 font-black uppercase">Fixed</span>`}
                    </div>
                </div>
                <div class="grid-viewport"><div class="hour-grid"></div></div>
            `;

            const grid = row.querySelector('.hour-grid');
            for (let i = 0; i < 24; i++) {
                const cell = document.createElement('div');
                const d = new Date(); d.setUTCHours(i, 0, 0, 0);
                const localHour = parseInt(d.toLocaleTimeString('en-US', { timeZone: obj.zone, hour12: false, hour: 'numeric' }));
                const ampm = d.toLocaleTimeString('en-US', { timeZone: obj.zone, hour: 'numeric', hour12: true }).split(' ')[1];

                cell.className = `hour-cell ${localHour >= 9 && localHour <= 17 ? 'work' : ''} ${localHour >= 22 || localHour <= 6 ? 'night' : ''} ${i === activeUtcIndex ? 'active' : ''}`;
                cell.innerHTML = `<span class="text-xs font-bold">${localHour % 12 || 12}</span><span class="text-[7px] font-black uppercase opacity-60">${ampm}</span>`;
                cell.onclick = () => { activeUtcIndex = i; render(); };
                grid.appendChild(cell);
            }
            container.appendChild(row);
        });
    }

    setInterval(updateUTC, 1000);
    render();
    updateUTC();
</script>
</body>
</html>
