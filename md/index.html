<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer | RMKR Dev</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%23FFC300' d='M0 64C0 28.7 28.7 0 64 0H224V128c0 17.7 14.3 32 32 32H384V288H216c-13.3 0-24 10.7-24 24s10.7 24 24 24H384V448c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V64zm384 64H256V0L384 128z'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* Your Custom Theme */
        :root {
            --color-bg: #0C1524; 
            --color-card: #18233C; 
            --color-accent: #FFC300; 
            --color-text: #F0F4F8; 
            --color-muted: #A0AEC0; 
            --color-line: #2D3748;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            margin: 0;
        }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        header.top {
            background: linear-gradient(135deg, rgba(24, 35, 60, 0.95), rgba(255, 195, 0, 0.05));
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(45, 55, 72, 0.5);
            padding: 1rem 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .section-title {
            position: relative;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            color: var(--color-accent);
            letter-spacing: 0.05em;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 100%;
            background-color: var(--color-accent);
            border-radius: 3px;
            box-shadow: 0 0 8px var(--color-accent);
        }

        /* Editor Area */
        textarea {
            width: 100%;
            height: 200px;
            background: var(--color-bg);
            color: var(--color-text);
            border: 2px dashed var(--color-line);
            border-radius: 12px;
            padding: 1rem;
            font-family: monospace;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        textarea.dragover {
            background: rgba(255, 195, 0, 0.05);
            border-color: var(--color-accent);
        }

        /* Preview Area - Overriding GitHub CSS to match your theme */
        .markdown-body {
            background-color: var(--color-card) !important;
            color: var(--color-text) !important;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(45, 55, 72, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: var(--color-accent) !important;
            border-bottom-color: var(--color-line) !important;
        }

        .markdown-body code {
            background-color: rgba(255, 255, 255, 0.1) !important;
            color: var(--color-accent) !important;
        }

        /* Buttons from your CSS */
        .cta-button {
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            gap: 8px;
        }

        .btn-gold {
            background: var(--color-accent);
            color: var(--color-bg);
            border: 1px solid var(--color-accent);
        }

        .btn-gold:hover {
            background: #FFD700;
            box-shadow: 0 0 15px rgba(255, 195, 0, 0.5);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--color-muted);
            color: var(--color-muted);
        }

        .btn-outline:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            background: rgba(255, 195, 0, 0.05);
        }
    </style>
</head>
<body>

    <header class="top">
        <div class="wrap flex justify-between items-center">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-file-code text-2xl" style="color: var(--color-accent);"></i>
                <h2 class="text-xl font-bold tracking-tight">RMKR <span style="color: var(--color-accent);">MD</span></h2>
            </div>
            <a href="../" class="btn-outline cta-button text-sm">
                <i class="fa-solid fa-arrow-left"></i> Profile
            </a>
        </div>
    </header>

    <main class="wrap">
        <div class="section-title">Editor & Preview</div>
        
        <div class="mb-8">
            <textarea id="md-input" placeholder="Paste Markdown content or Drop an .md file here..."></textarea>
            <p class="text-xs mt-2" style="color: var(--color-muted);">
                <i class="fa-solid fa-circle-info"></i> Supports drag and drop for .md and .txt files.
            </p>
        </div>

        <div class="flex flex-wrap gap-4 mb-8">
            <button onclick="downloadPDF()" class="cta-button btn-gold">
                <i class="fa-solid fa-file-pdf"></i> Download PDF
            </button>
            <button onclick="copyHTML()" class="cta-button btn-outline">
                <i class="fa-solid fa-copy"></i> Copy HTML
            </button>
            <button onclick="clearContent()" class="cta-button btn-outline" style="color: #ff4d4d; border-color: #ff4d4d33;">
                <i class="fa-solid fa-trash-can"></i> Clear
            </button>
        </div>

        <div id="preview-container">
            <div id="preview" class="markdown-body">
                <div class="flex flex-col items-center justify-center py-10 text-center">
                    <i class="fa-regular fa-keyboard text-4xl mb-4" style="color: var(--color-line);"></i>
                    <p style="color: var(--color-muted);">Waiting for your content to render...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('md-input');
        const output = document.getElementById('preview');

        // 1. Markdown Engine
        const render = (val) => {
            if (!val.trim()) {
                output.innerHTML = `<div class="flex flex-col items-center justify-center py-10 text-center">
                    <i class="fa-regular fa-keyboard text-4xl mb-4" style="color: var(--color-line);"></i>
                    <p style="color: var(--color-muted);">Waiting for your content to render...</p>
                </div>`;
                return;
            }
            output.innerHTML = marked.parse(val);
        };

        input.addEventListener('input', () => render(input.value));

        // 2. Drag & Drop
        input.addEventListener('dragover', (e) => { e.preventDefault(); input.classList.add('dragover'); });
        input.addEventListener('dragleave', () => input.classList.remove('dragover'));
        input.addEventListener('drop', (e) => {
            e.preventDefault();
            input.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    input.value = ev.target.result;
                    render(input.value);
                };
                reader.readAsText(file);
            }
        });

        // 3. Actions
        function copyHTML() {
            navigator.clipboard.writeText(output.innerHTML);
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
            setTimeout(() => btn.innerHTML = originalText, 2000);
        }

        function clearContent() {
            input.value = "";
            render("");
        }

        // 4. PDF Generation
        function downloadPDF() {
            if (!input.value.trim()) return alert("Nothing to export!");
            
            const element = document.getElementById('preview');
            const opt = {
                margin:       10,
                filename:     'rmkr-document.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, backgroundColor: '#18233C' },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Temporary padding for PDF look
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
