<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RMKR JSON Studio</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0C1524;
--card:#18233C;
--accent:#FFC300;
--line:#2D3748;
--text:#F0F4F8;
}

body{
font-family:Inter;
background:var(--bg);
color:var(--text);
}

textarea{
background:#080e1a;
border:1px solid var(--line);
border-radius:10px;
font-family:monospace;
}

.node rect{
fill:#081b10;
stroke:#1aff6b;
stroke-width:1.3;
rx:8;
}

.node text{
font-size:12px;
fill:#d8ffe7;
}

.type{
font-size:10px;
fill:#6ef3a5;
}

.link{
fill:none;
stroke:#8aa;
stroke-width:1.2;
}

</style>

</head>

<body>

<header class="border-b border-[#2D3748] p-4 flex justify-between items-center">

<h2 class="text-xl font-bold">
RMKR <span class="text-yellow-400">JSON Studio</span>
</h2>

<div class="flex gap-3">

<button onclick="exportPNG()" class="bg-yellow-400 text-black px-3 py-1 rounded text-sm">
Export PNG
</button>

<button onclick="downloadSchema()" class="bg-yellow-400 text-black px-3 py-1 rounded text-sm">
Export Schema
</button>

<a href="../" class="bg-yellow-400 text-black px-3 py-1 rounded text-sm">
Hub
</a>

</div>

</header>

<div class="p-6 max-w-7xl mx-auto">

<div class="grid md:grid-cols-2 gap-6 mb-6">

<div>

<label class="text-xs uppercase opacity-70">Paste JSON</label>

<textarea id="jsonInput" class="w-full h-44 p-3 mt-2">

{
 "orderId":"ORD-1001",
 "status":"PAID",
 "customer":{
   "customerId":"C001",
   "name":"John",
   "email":"john@email.com",
   "address":{
     "city":"London",
     "country":"UK"
   }
 },
 "items":[
   {
     "productId":"P100",
     "price":120,
     "quantity":2
   }
 ],
 "payment":{
   "method":"CARD",
   "amount":240
 }
}

</textarea>

<div class="flex gap-3 mt-3">

<button onclick="renderGraph()" class="bg-yellow-400 text-black px-4 py-2 rounded font-bold">
Visualize
</button>

<input id="searchBox" placeholder="Search field..."
class="bg-[#18233C] px-3 py-2 rounded text-sm border border-[#2D3748]">

</div>

</div>

<div class="text-sm opacity-80">

<p class="text-yellow-400 font-semibold mb-3">RMKR JSON Studio</p>

<ul class="space-y-1 list-disc ml-5">

<li>Automatic JSON schema inference</li>
<li>Interactive graph visualization</li>
<li>Pan / zoom navigation</li>
<li>Copy JSON path</li>
<li>Export schema</li>
<li>Export diagram PNG</li>

</ul>

</div>

</div>

<div id="graphContainer"
class="bg-[#18233C] rounded-xl border border-[#2D3748] p-4 overflow-hidden">

<svg width="1600" height="800"></svg>

</div>

</div>

<script>

function typeOf(v){
if(Array.isArray(v)) return "array"
if(v===null) return "null"
return typeof v
}

function buildTree(name,val,path=""){

let node={
name:name,
type:typeOf(val),
path:path?path+"."+name:name,
children:[]
}

if(node.type==="object"){

Object.entries(val).forEach(([k,v])=>{
node.children.push(buildTree(k,v,node.path))
})

}

if(node.type==="array" && val.length){

node.children.push(buildTree("items",val[0],node.path))

}

return node
}

function renderGraph(){

let json

try{
json=JSON.parse(document.getElementById("jsonInput").value)
}catch{
alert("Invalid JSON")
return
}

const data=buildTree("root",json)

const svg=d3.select("svg")

svg.selectAll("*").remove()

const g=svg.append("g")

svg.call(
d3.zoom().scaleExtent([0.4,3])
.on("zoom",(e)=>g.attr("transform",e.transform))
)

const tree=d3.tree().nodeSize([80,260])

const root=d3.hierarchy(data)

tree(root)

g.selectAll(".link")
.data(root.links())
.enter()
.append("path")
.attr("class","link")
.attr("d",d3.linkHorizontal()
.x(d=>d.y)
.y(d=>d.x)
)

const node=g.selectAll(".node")
.data(root.descendants())
.enter()
.append("g")
.attr("class","node")
.attr("transform",d=>"translate("+d.y+","+d.x+")")

node.append("rect")
.attr("width",200)
.attr("height",40)
.attr("x",-20)
.attr("y",-20)

node.append("text")
.attr("dy","-2")
.text(d=>d.data.name)

node.append("text")
.attr("class","type")
.attr("dy","14")
.text(d=>"type: "+d.data.type)

node.on("click",(e,d)=>{
navigator.clipboard.writeText(d.data.path)
alert("Copied path: "+d.data.path)
})

}

renderGraph()

function downloadSchema(){

let json

try{
json=JSON.parse(document.getElementById("jsonInput").value)
}catch{
return
}

function schema(v){

let t=typeOf(v)

if(t==="object"){

let props={}

Object.entries(v).forEach(([k,val])=>{
props[k]=schema(val)
})

return{
type:"object",
properties:props
}

}

if(t==="array"){

return{
type:"array",
items:schema(v[0]||{})
}

}

return{type:t}

}

const sch=schema(json)

const blob=new Blob(
[JSON.stringify(sch,null,2)],
{type:"application/json"}
)

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="schema.json"
a.click()

}

function exportPNG(){

const node=document.getElementById("graphContainer")

htmlToImage.toPng(node).then(function(dataUrl){

const a=document.createElement("a")

a.download="json-graph.png"
a.href=dataUrl
a.click()

})

}

</script>

</body>
</html>
