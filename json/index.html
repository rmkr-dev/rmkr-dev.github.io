<!DOCTYPE html>
<html lang="en">
<head>

<script>fetch('https://api.countapi.xyz/hit/rmkr-dev.github.io/jsonviewer');</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JSON Viewer | RMKR Dev</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

:root{
--color-bg:#0C1524;
--color-card:#18233C;
--color-accent:#FFC300;
--color-text:#F0F4F8;
--color-line:#2D3748;
}

body{
font-family:'Inter',sans-serif;
background:var(--color-bg);
color:var(--color-text);
}

.wrap{max-width:1400px;margin:auto;padding:1.5rem}

.json-node{
margin-left:20px;
border-left:1px dashed #2D3748;
padding-left:10px;
}

.json-key{color:#FFC300;font-weight:600}

.json-string{color:#38bdf8}

.json-number{color:#f472b6}

.json-boolean{color:#22c55e}

.json-null{color:#9ca3af}

.toggle{
cursor:pointer;
margin-right:6px;
color:#94a3b8;
}

.viewer{
background:#080e1a;
border:1px solid var(--color-line);
border-radius:10px;
padding:16px;
overflow:auto;
height:520px;
font-family:monospace;
font-size:14px;
}

textarea{
background:var(--color-card);
border:1px solid var(--color-line);
border-radius:10px;
padding:12px;
width:100%;
height:520px;
font-family:monospace;
}

.btn{
background:var(--color-accent);
color:black;
padding:8px 14px;
border-radius:8px;
font-weight:600;
}

.searchbox{
background:#18233C;
border:1px solid #2D3748;
padding:6px 10px;
border-radius:6px;
}

</style>

</head>

<body>

<header class="border-b border-[#2D3748] sticky top-0 bg-[#0C1524]">

<div class="wrap flex justify-between items-center">

<div class="flex items-center gap-3">

<i class="fa-solid fa-code text-xl text-[#FFC300]"></i>

<h2 class="font-bold text-lg">RMKR <span class="text-[#FFC300]">JSON</span></h2>

</div>

<a href="../" class="btn flex items-center gap-2">
<i class="fa-solid fa-arrow-left"></i> Hub
</a>

</div>

</header>

<main class="wrap">

<div class="text-2xl font-bold mb-6 text-[#FFC300]">JSON Explorer</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

<!-- LEFT EDITOR -->

<div>

<div class="flex justify-between mb-2">

<div class="font-semibold">JSON INPUT</div>

<div class="flex gap-2">

<button onclick="formatJSON()" class="btn text-sm">Format</button>

<button onclick="downloadJSON()" class="btn text-sm">Download</button>

</div>

</div>

<textarea id="jsonInput" placeholder="Paste JSON here..."></textarea>

</div>

<!-- RIGHT VIEWER -->

<div>

<div class="flex justify-between mb-2">

<div class="font-semibold">TREE VIEW</div>

<input id="searchBox" placeholder="Search..." class="searchbox text-sm">

</div>

<div id="viewer" class="viewer"></div>

</div>

</div>

</main>

<script>

const input=document.getElementById("jsonInput")
const viewer=document.getElementById("viewer")
const search=document.getElementById("searchBox")

function getType(v){
if(Array.isArray(v)) return "array"
if(v===null) return "null"
return typeof v
}

function createNode(key,val,path){

let type=getType(val)

let container=document.createElement("div")
container.className="json-node"

let row=document.createElement("div")

let toggle=document.createElement("span")

if(type==="object"||type==="array"){
toggle.innerHTML="▶"
toggle.className="toggle"
row.appendChild(toggle)
}

let keySpan=document.createElement("span")
keySpan.className="json-key"
keySpan.textContent=key+": "

row.appendChild(keySpan)

let valueSpan=document.createElement("span")

if(type==="string"){
valueSpan.className="json-string"
valueSpan.textContent='"'+val+'"'
}

else if(type==="number"){
valueSpan.className="json-number"
valueSpan.textContent=val
}

else if(type==="boolean"){
valueSpan.className="json-boolean"
valueSpan.textContent=val
}

else if(type==="null"){
valueSpan.className="json-null"
valueSpan.textContent="null"
}

row.appendChild(valueSpan)

container.appendChild(row)

if(type==="object"||type==="array"){

let children=document.createElement("div")
children.style.display="none"

toggle.onclick=()=>{
children.style.display=
children.style.display==="none"?"block":"none"
toggle.innerHTML=
children.style.display==="none"?"▶":"▼"
}

if(type==="object"){
for(let k in val){
children.appendChild(createNode(k,val[k],path+"."+k))
}
}

if(type==="array"){
val.forEach((v,i)=>{
children.appendChild(createNode(i,v,path+"."+i))
})
}

container.appendChild(children)

}

return container

}

function render(){

try{

let json=JSON.parse(input.value)

viewer.innerHTML=""

viewer.appendChild(createNode("root",json,"root"))

}catch(e){

viewer.innerHTML="<span class='text-red-400'>Invalid JSON</span>"

}

}

input.addEventListener("input",render)

function formatJSON(){

try{
let obj=JSON.parse(input.value)
input.value=JSON.stringify(obj,null,4)
render()
}catch{}
}

function downloadJSON(){

let blob=new Blob([input.value],{type:"application/json"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url

a.download="data.json"

a.click()

}

search.addEventListener("input",()=>{

let text=search.value.toLowerCase()

document.querySelectorAll(".json-node").forEach(n=>{

if(n.innerText.toLowerCase().includes(text)){
n.style.display="block"
}else{
n.style.display="none"
}

})

})

</script>

</body>
</html>
